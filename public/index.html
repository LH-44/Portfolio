<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="binaryCanvas"></canvas>

<header>
    <h1>☕ Lalit Kiran 🔴</h1>
    <p>Full Stack Developer | Manchester United Fan</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I love coding, coffee, and football ⚽</p>
</section>

<section>

    <ul>
        <li>☕ Coffee</li>
        <li>🔴 Manchester United</li>
        <li>💻 Coding</li>
    </ul>
</section>
<header>
    <h1 class="logo">☕ Lalit Kiran 🔴</h1>

</header>

<!-- Coffee Animation -->
<div class="coffee">
    <div class="cup"></div>
    <div class="steam"></div>
</div>

<!-- Projects -->
<section>
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">F1 Pitstop Website</div>
        <div class="card">Portfolio</div>

<section>
    <h2>Feedback</h2>
    <form id="feedbackForm">
        <input type="text" placeholder="Name" id="name" required>
        <input type="email" placeholder="Email" id="email" required>
        <textarea placeholder="Message" id="message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<script src="script.js"></script>
