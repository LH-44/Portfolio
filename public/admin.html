<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: red;
        }

        .card {
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>📊 Feedback Dashboard</h1>

<div id="feedbackList">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const res = await fetch("/admin/feedback");
        const data = await res.json();

        const container = document.getElementById("feedbackList");
        container.innerHTML = "";

        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <h3>${item.name}</h3>
                <p>${item.email}</p>
                <p>${item.message}</p>
            `;
            container.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        document.getElementById("feedbackList").innerHTML = "❌ Error loading data";
    }
});
</script>

</body>
</html>
